<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amarafon – Marmoraria</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* RESET */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Lato', sans-serif;
      /* FUNDO DE PEDRA */
      background-image: url('marble_bg.jpg');
      background-size: cover;
      background-position: center center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      position: relative;
    }

    /* Overlay para elegância e leitura */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(2px);
      z-index: 0;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      min-height: 100vh;
    }

    /* CARD COM EFEITO GLASSMORPHISM */
    .card {
      width: 100%;
      max-width: 580px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 30px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      padding: 45px 35px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
    }

    /* LOGO COM DESTAQUE */
    .logo-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 5px;
    }

    .logo-wrapper img {
      max-width: 100%;
      height: auto;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, #8b6914, #c9a84c, #8b6914);
      border-radius: 3px;
    }

    .description {
      font-size: 1.05rem;
      line-height: 1.8;
      color: #2c241a;
      text-align: center;
      max-width: 500px;
      font-weight: 400;
    }

    .buttons-grid {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
    }

    /* BOTÕES ANIMADOS E LUXUOSOS */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      width: 100%;
      padding: 18px;
      border-radius: 15px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .btn:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 12px 25px rgba(0,0,0,0.2);
      filter: brightness(1.15);
    }

    /* Efeito de brilho que passa pelo botão */
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: 0.6s;
    }

    .btn:hover::before {
      left: 150%;
    }

    /* CORES DOS BOTÕES HARMONIZADAS COM A LOGO */
    .btn-whatsapp { 
      background: linear-gradient(135deg, #25D366 0%, #128c5e 100%); 
      color: white; 
    }
    
    .btn-instagram { 
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); 
      color: white; 
    }
    
    .btn-facebook { 
      background: linear-gradient(135deg, #1877F2 0%, #0d5dbf 100%); 
      color: white; 
    }
    
    .btn-email { 
      background: linear-gradient(135deg, #2c241a 0%, #4a3f33 100%); 
      color: #c9a84c; /* Dourado da logo no texto do e-mail */
      border: 1px solid #c9a84c;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #5a4a3a;
      text-align: center;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* RESPONSIVIDADE */
    @media (max-width: 480px) {
      .card { padding: 35px 20px; }
      .btn { font-size: 0.9rem; padding: 15px; }
      .description { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="card">
      <div class="logo-wrapper">
        <!-- Logo de luxo da Amarafon -->
        <img src="logo.jpg" alt="Amarafon Marmoraria" />
      </div>

      <div class="divider"></div>
      
      <p class="description">
        Transformamos sonhos em realidade com o requinte das pedras naturais. 
        <strong>Amarafon Marmoraria</strong>: a excelência em acabamentos que seu projeto merece.
      </p>

      <div class="buttons-grid">
        <!-- WhatsApp 1 -->
        <a href="https://wa.me/5565992878143" target="_blank" class="btn btn-whatsapp">
          <i class="fa-brands fa-whatsapp"></i> Atendimento 1
        </a>

        <!-- WhatsApp 2 -->
        <a href="https://wa.me/5565999941048" target="_blank" class="btn btn-whatsapp">
          <i class="fa-brands fa-whatsapp"></i> Atendimento 2
        </a>

        <!-- Instagram -->
        <a href="https://www.instagram.com/amarafon_marmo/" target="_blank" class="btn btn-instagram">
          <i class="fa-brands fa-instagram"></i> Instagram
        </a>

        <!-- Facebook -->
        <a href="https://www.facebook.com/100064115286005" target="_blank" class="btn btn-facebook">
          <i class="fa-brands fa-facebook-f"></i> Facebook
        </a>

        <!-- E-mail -->
        <a href="mailto:marmor.amarafon@gmail.com" class="btn btn-email">
          <i class="fa-solid fa-envelope"></i> Enviar E-mail
        </a>
      </div>

      <p class="footer">
        &copy; 2026 AMARAFON MARMORARIA
      </p>
    </div>
  </div>
</body>
</html>
